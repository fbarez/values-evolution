# Mid-training config — continued pre-training on values corpus
# This is NOT instruction fine-tuning; it extends the LM objective.

defaults:
  - model: qwen2.5-7b   # swap to olmo2-7b for comparative runs

task: mid_training

# Optimiser
learning_rate: 2e-5       # range 1e-5–5e-5; start conservatively; lower than SFT
lr_scheduler: cosine
warmup_steps: 100
weight_decay: 0.01
max_grad_norm: 1.0

# Batch
per_device_train_batch_size: 4
gradient_accumulation_steps: 8   # effective batch = 32
max_seq_length: 2048

# Duration
max_steps: 5000           # ~2–3 epochs over country_year_doc corpus; adjust after pilot
save_steps: 500
eval_steps: 500
logging_steps: 50

# Replay — mix general-domain data to mitigate catastrophic forgetting
# See "continual learning" literature; ratio 10–20% general is standard
replay:
  enabled: true
  ratio: 0.15             # 15% of each batch is general-domain text (e.g. C4 or Dolma)
  source: dolma_v1_6      # HF dataset id
  seed: 42

# Precision
bf16: true               # A100/H100; switch to fp16 for older GPUs
tf32: true

# Checkpointing
output_dir: outputs/checkpoints
save_total_limit: 3      # keep only last 3 to save disk
load_best_model_at_end: true
metric_for_best_model: val_js_divergence   # lower is better

# Accelerate / FSDP
fsdp: full_shard          # for multi-GPU; disable for single-GPU debugging
fsdp_config:
  fsdp_offload_params: false
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP

notes: >
  Start with a short pilot run (max_steps=500) to verify loss decreases
  and the no-leakage test passes before committing to a full run.
  Log val_js_divergence every eval_steps — early stopping if no improvement
  after 1000 steps.
