# OLMo 2 7B base checkpoint
name: olmo2-7b
hf_id: allenai/OLMo-2-1124-7B   # fully open weights + training data
dtype: bfloat16
max_seq_length: 4096
vocab_size: 100352
architecture: olmo2

tokenizer_id: allenai/OLMo-2-1124-7B

