notes: >
  OLMo 2 advantage: fully documented training data (Dolma corpus), enabling
  cleaner attribution of mid-training effects. Good ablation partner for Qwen.
  Weaker multilingual coverage than Qwen — may underperform on non-English
  survey items. Run after Qwen baseline to quantify this gap.
  Full training code and data available at https://github.com/allenai/OLMo.
